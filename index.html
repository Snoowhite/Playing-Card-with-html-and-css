<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="playing-cards">
        <div class="card spade">
            <div class="left-corner">
                <span>3</span><br>
                <span>♠</span>
            </div>
            <div class="middle">
                <span>♠♠</span>
            </div>
            <div class="right-corner">
                <span>3</span><br>
                <span>♠</span>
            </div>
        </div>
        <div class="card heart">
            <div class="left-corner">
                <span>4</span><br>
                <span>♥</span>
            </div>
            <div class="middle">
                <span>♥♥</span>
            </div>
            <div class="right-corner">
                <span>4</span><br>
                <span>♥</span>
            </div>
        </div>
        <div class="card diamond">
            <div class="left-corner">
                <span>8</span><br>
                <span>♦</span>
            </div>
            <div class="middle">
                <span>♦♦</span>
            </div>
            <div class="right-corner">
                <span>8</span><br>
                <span>♦</span>
            </div>
        </div>
        <div class="card club">
            <div class="left-corner">
                <span>2</span><br>
                <span>♣</span>
            </div>
            <div class="middle">
                <span>♣♣</span>
            </div>
            <div class="right-corner">
                <span>2</span><br>
                <span>♣</span>
            </div>
        </div>
        <div class="card spade-3">
            <div class="left-corner">
                <span>A</span><br>
                <span>♠</span>
            </div>
            <div class="middle">
                <span>♠♠</span>
            </div>
            <div class="right-corner">
                <span>A</span><br>
                <span>♠</span>
            </div>
        </div>
    </main>
</body>
</html>
